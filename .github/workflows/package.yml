name: Package RTI Driver

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Package driver
        run: python3 scripts/package-driver.py

      - name: Upload packaged driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: rti-http-client-driver
          path: dist/*.rtidriver

      - name: Attach driver to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.rtidriver
